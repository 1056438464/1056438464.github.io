<meta name="description" content="错误情况：今天部署war包时，已经unzip his.war -d ROOT/ ，并且tomcat start 成功，但网页却打不开。 问题原因：当his.war包 放到webapp/目录下，解压完成后，没有删除war包。当tomcat再启动的时候会自己解压webapp目录下的war，这时tomcat不明白启动那个，所以导致这样的问题。 解决方法：在tomcat启动前删除已经解压的war包">
